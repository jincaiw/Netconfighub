services:
  netconfighub:
    image: jincaiw/netconfighub:0.1.2
    build:
      context: .
      args:
        VERSION: v0.1.2
    ports:
      - "8080:8080"
    volumes:
      - netconfighub_data:/app/data
    environment:
      NCH_ENV: production
      NCH_DATA_DIR: /app/data
      NCH_ADMIN_USERNAME: ${NCH_ADMIN_USERNAME:-admin}
      NCH_ADMIN_PASSWORD: ${NCH_ADMIN_PASSWORD:?set NCH_ADMIN_PASSWORD}
      NCH_JWT_SECRET: ${NCH_JWT_SECRET:?set NCH_JWT_SECRET}
      NCH_ENCRYPTION_KEY: ${NCH_ENCRYPTION_KEY:?set NCH_ENCRYPTION_KEY}
      NCH_CORS_ALLOWED_ORIGINS: ${NCH_CORS_ALLOWED_ORIGINS:-http://localhost:8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: netconfighub
      MYSQL_USER: netconfighub
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  netconfighub_data:
  mysql_data:
