version: '3.8'
services:
  netconfighub:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    environment:
      - NCH_CONFIG_PATH=/app/configs/config.yaml
    restart: unless-stopped

  netconfighub-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: netconfighub
      MYSQL_DATABASE: netconfighub
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    profiles:
      - mysql

volumes:
  mysql_data:
