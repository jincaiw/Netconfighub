server:
  host: "0.0.0.0"
  port: 8080
  jwt_secret: "change-me-in-production"
  jwt_expire_hours: 24
  encryption_key: "netconfighub-default-enc-key-32byte"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""
  cors:
    allowed_origins:
      - "*"
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed_headers:
      - Origin
      - Content-Type
      - Authorization
    max_age_seconds: 86400

database:
  driver: "sqlite"
  sqlite_path: "./data/netconfighub.db"
  mysql_dsn: ""

git:
  repo_path: "./data/configs"
  author_name: "NetConfigHub"
  author_email: "netconfighub@local"
  gpg_sign_key: ""
  git_crypt_enabled: false
  git_crypt_key_file: ""

scheduler:
  default_interval: "1h"
  worker_pool_size: 10
  max_retries: 3
  retry_delay: "30s"
  task_timeout: "5m"

log:
  level: "info"
  format: "json"

sanitize:
  enabled: true
  mask_passwords: true
  mask_snmp_community: true
  mask_enable_secret: true

notify:
  enabled: false
  type: "webhook"
  webhook_url: ""
  smtp_host: ""
  smtp_port: 25
  smtp_user: ""
  smtp_pass: ""
  from_addr: ""
  to_addrs: ""
